services:
  - type: web
    name: pdf-toolkit
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: FRONTEND_URL
        value: https://amjad36942.github.io
    autoDeploy: true
